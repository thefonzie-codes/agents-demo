version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
    volumes:
      - db-data:/app/sample_datasets/travel_company_customer_db
    restart: unless-stopped
    # For local development with hot reload, uncomment:
    # profiles: ["dev"]

volumes:
  db-data:
